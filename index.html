<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>
    <style>
        body {
            background: linear-gradient(to right, orange, pink);
            font-family: Arial, sans-serif;
            overflow: hidden;
            color: white;
        }
        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            text-align: center;
        }
        .heart {
            position: absolute;
            color: red;
            font-size: 24px;
            animation: float 6s infinite;
        }
        @keyframes float {
            0% {transform: translateY(0);}
            50% {transform: translateY(-30px);}
            100% {transform: translateY(0);}
        }
        .gallery {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .gallery img {
            width: 100px;
            height: 100px;
            margin: 10px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>

    <div id="countdown"></div>
    
    <div class="gallery">
        <!-- Replace with Base64 encoded images -->
        <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUA..." alt="Image 1">
        <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUA..." alt="Image 2">
        <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUA..." alt="Image 3">
        <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUA..." alt="Image 4">
    </div>
    
    <div class="heart" style="left: 10%; top: 20%;">❤️</div>
    <div class="heart" style="left: 20%; top: 30%;">❤️</div>
    <div class="heart" style="left: 30%; top: 10%;">❤️</div>

    <script>
        // Countdown Timer
        const countdownDate = new Date("June 3, 2026 00:00:00").getTime();
        const countdownFunction = setInterval(() => {
            const now = new Date().getTime();
            const distance = countdownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;

            if (distance < 0) {
                clearInterval(countdownFunction);
                document.getElementById("countdown").innerHTML = "Countdown Finished";
            }
        }, 1000);
    </script>

</body>
</html>
